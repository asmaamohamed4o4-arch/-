<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إبداعك - تسجيل الدخول</title>
  <link rel="stylesheet" href="../CSS/shared.css">
  <link rel="stylesheet" href="../CSS/LoginPage.css">
  <style>
    body { background: linear-gradient(135deg, #f8f4f0 0%, #fde8e8 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .logo { margin-bottom: 30px; }
    .logo img { height: 60px; }
    .login-box {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(151,7,10,0.15);
      text-align: center;
    }
    .login-box h2 {
      font-family: 'Cairo', sans-serif;
      font-size: 26px;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .login-box p { color: var(--gray); margin-bottom: 24px; font-size: 14px; }
    .form-actions { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
    .form-actions label { color: var(--gray); font-size: 13px; }
    .forget-link { color: var(--primary); font-size: 13px; text-decoration: none; font-weight: 600; }
    .forget-link:hover { text-decoration: underline; }
    .divider { color: var(--gray); font-size: 13px; margin: 16px 0; }
    .create-link { display: block; text-align: center; color: var(--primary); font-weight: 700; font-family: 'Cairo', sans-serif; text-decoration: none; margin-top: 12px; font-size: 14px; }
    .create-link:hover { text-decoration: underline; }
    .btn-full { width: 100%; padding: 14px; font-size: 16px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="logo">
    <a href="HomePage.html"><img src="../Image/loooo.png"/></a>
  </div>

  <div class="login-box">
    <h2>تسجيل الدخول</h2>
    <p>أهلاً بعودتك! سجّل دخولك للمتابعة</p>

    <input class="form-control" type="text" placeholder="اسم المستخدم أو البريد الإلكتروني" name="username">
    <input class="form-control" type="password" placeholder="كلمة المرور" name="password">

    <div class="form-actions">
      <label>
        <input type="checkbox" name="rememberMe"> تذكرني
      </label>
      <a class="forget-link" href="ForgotPasswordPage.html">نسيت كلمة المرور؟</a>
    </div>

    <button class="btn-primary btn-full" onclick="window.location.href='HomePage.html'">دخول</button>

    <div class="divider">─── أو ───</div>
    <a class="create-link" href="SignUpPage.html">ليس لديك حساب؟ سجّل الآن</a>
  </div>
</body>
</html>
